name: EquiRise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  rust-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Update Cargo dependencies precises
        run: |
          cargo update -p ed25519-dalek --precise 2.2.0 || true
          cargo update -p curve25519-dalek --precise 4.1.3 || true
        working-directory: contracts

      - name: Build Contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release > ../build_output.log 2>&1 || touch ../failed.flag
        working-directory: contracts

      - name: Run Contract Tests
        run: |
          if [ ! -f ../failed.flag ]; then
            cargo test > ../test_output.log 2>&1 || touch ../failed.flag
          fi
        working-directory: contracts

      - name: Commit logs on failure
        run: |
          if [ -f failed.flag ]; then
            git config --global user.name "GitHub Actions CI"
            git config --global user.email "ci@equirise.com"
            echo "CI PIPELINE FAILURE REPORT - RUN #${{ github.run_id }}" > commit_msg.txt
            echo "==========================================" >> commit_msg.txt
            echo "Root Directory Listing:" >> commit_msg.txt
            ls -la >> commit_msg.txt
            echo "------------------------------------------" >> commit_msg.txt
            echo "Cargo test output logs:" >> commit_msg.txt
            if [ -f test_output.log ]; then
              cat test_output.log >> commit_msg.txt
            else
              echo "test_output.log not found!" >> commit_msg.txt
            fi
            echo "------------------------------------------" >> commit_msg.txt
            echo "Cargo build output logs:" >> commit_msg.txt
            if [ -f build_output.log ]; then
              cat build_output.log >> commit_msg.txt
            else
              echo "build_output.log not found!" >> commit_msg.txt
            fi
            git commit --allow-empty -F commit_msg.txt
            git push origin HEAD:ci-fail-logs --force
            exit 1
          fi
          echo "No contract build/test failures encountered."

  frontend-nextjs:
    name: Build & Test Next.js App
    runs-on: ubuntu-latest
    needs: rust-contracts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Run Vitest Suite
        run: npm run test
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
