name: EquiRise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  rust-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Run Contract Tests
        run: |
          cargo test > test_output.log 2>&1
        working-directory: contracts

      - name: Commit logs on failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions CI"
          git config --global user.email "ci@equirise.com"
          git add contracts/test_output.log
          git add Cargo.lock || true
          git add contracts/Cargo.lock || true
          git commit -m "ci: failed test logs [skip ci]" || exit 0
          git push origin HEAD:ci-fail-logs --force

  frontend-nextjs:
    name: Build & Test Next.js App
    runs-on: ubuntu-latest
    needs: rust-contracts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Run Vitest Suite
        run: npm run test
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
